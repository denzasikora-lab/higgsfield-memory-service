services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memory}
      POSTGRES_DB: ${POSTGRES_DB:-memory}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memory} -d ${POSTGRES_DB:-memory}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - memory_pgdata:/var/lib/postgresql/data

  memory-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://memory:memory@postgres:5432/memory}
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      USE_LLM_EXTRACTION: ${USE_LLM_EXTRACTION:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

volumes:
  memory_pgdata:
